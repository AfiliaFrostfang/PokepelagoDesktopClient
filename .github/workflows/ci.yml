name: CI

on:
  pull_request:
    branches: [main, beta]
  push:
    branches: [main, beta]
    tags: ['v*']
  workflow_call:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npx tsc --noEmit

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm run test:run

      - name: Audit dependencies
        # Audit only shipped (production) deps. The static build bundles no
        # devDependencies, so build-tool advisories (e.g. esbuild via vite) never
        # reach users. Run a full `npm audit` manually when bumping build tooling.
        run: npm audit --omit=dev --audit-level=high
